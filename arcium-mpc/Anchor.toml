[toolchain]
anchor_version = "1.0.2"
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
veilpay = "AVqXCN6eZshXdAaRHhBV4AMxpsVZKj9jRCdSQptax7GD"

[programs.devnet]
veilpay = "AVqXCN6eZshXdAaRHhBV4AMxpsVZKj9jRCdSQptax7GD"

[registry]
